<div class="list-container">
  <div class="grid">
  @for (movie of movies(); track movie.data.id) {
    <div class="grid-item" [class.fade-out]="deletingIds().has(movie.data.id)" draggable="true" (dragstart)="onDragStart($event, movie.data.id)" >
      <app-movie-card [movieItem]="movie" />
      <button class="delete" (click)="onDeleteMovie(movie)" > ✖ </button>
    </div>
  }
  </div>
</div>

<div class="controls">
  <app-movie-form
    [isLoading]="isLoading()"
    (addMovieRequested)="addMovie($event)"
  />
  <app-movie-trash
    (removeAllRequested)="deleteAll()"
    (removeMovieRequested)="deleteMovieById($event)"
  />
</div>
<div class="list-container">
  <app-movie-list
    [movies]="movies()"
    [deletingIds]="deletingIds()"
    (removeMovieRequested)="deleteMovie($event)"
  />
</div>
